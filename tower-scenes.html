<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Suitspire · 塔楼场景测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0e; }
    canvas { display: block; }
    .hint {
      position: fixed; left: 20px; bottom: 16px;
      font: 14px 'Cinzel', 'Noto Sans SC', serif;
      letter-spacing: 1.5px; pointer-events: none;
      color: rgba(252, 211, 77, 0.75);
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }
    .hint .sub { display: block; margin-top: 2px;
      font: 11px/1.5 'Noto Sans SC', sans-serif;
      letter-spacing: 0.5px; color: rgba(244,244,245,0.55);
    }
    .switcher {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      display: flex; gap: 6px;
      background: rgba(20, 20, 28, 0.7);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      padding: 6px; border-radius: 999px;
      border: 1px solid rgba(252, 211, 77, 0.18);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font: 13px 'Noto Sans SC', sans-serif;
    }
    .switcher button {
      border: 0; background: transparent; cursor: pointer;
      padding: 9px 18px; border-radius: 999px;
      color: rgba(244,244,245,0.6); transition: all .25s;
      letter-spacing: 0.5px;
    }
    .switcher button:hover { color: rgba(252, 211, 77, 0.9); }
    .switcher button.active {
      background: linear-gradient(135deg, #fbbf24, #d4a14a);
      color: #1a1408; font-weight: 600;
      box-shadow: 0 0 16px rgba(252, 211, 77, 0.4);
    }
    .badge {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      font: 11px 'Cinzel', sans-serif; letter-spacing: 3px;
      color: rgba(252, 211, 77, 0.6);
      background: rgba(20, 20, 28, 0.5);
      padding: 6px 18px; border-radius: 999px;
      border: 1px solid rgba(252, 211, 77, 0.15);
      pointer-events: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="badge">SUITSPIRE · TOWER VISUAL TEST</div>
  <div class="hint" id="hint">塔外 · 跨越荒原<span class="sub">Outside · the long approach</span></div>
  <div class="switcher" id="switcher">
    <button data-scene="outside" class="active">塔外</button>
    <button data-scene="middle">塔中</button>
    <button data-scene="top">塔顶</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ============ Toon gradient（5 段）============
    function makeGradientMap(stops) {
      const c = document.createElement('canvas');
      c.width = stops.length; c.height = 1;
      const ctx = c.getContext('2d');
      stops.forEach((s, i) => { ctx.fillStyle = s; ctx.fillRect(i, 0, 1, 1); });
      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      tex.generateMipmaps = false;
      return tex;
    }
    const gradientMap = makeGradientMap([
      '#2a2630', '#5e5868', '#a89888', '#d8c8a0', '#f8e8b0'
    ]);

    function toon(color, emissive = 0x000000, emissiveIntensity = 0) {
      return new THREE.MeshToonMaterial({ color, emissive, emissiveIntensity, gradientMap });
    }
    function block(w, h, dpt, color, opts = {}) {
      const m = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, dpt),
        toon(color, opts.emissive || 0, opts.emissiveIntensity || 0)
      );
      m.castShadow = true;
      m.receiveShadow = true;
      return m;
    }
    function limb(w, h, dpt, color) {
      const pivot = new THREE.Group();
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, dpt), toon(color));
      mesh.position.y = -h / 2;
      mesh.castShadow = true;
      pivot.add(mesh);
      return pivot;
    }

    // ============ 小人（探险者风：兜帽斗篷 + 长杖）============
    function makeAdventurer(palette = {}) {
      const c = {
        cloak:  '#3a2a1e',
        hood:   '#2a1c12',
        skin:   '#e8c89a',
        pants:  '#1a1410',
        belt:   '#8a5828',
        boot:   '#1a0e08',
        staff:  '#5a3a20',
        crystal:'#fcd34d',
        ...palette,
      };
      const g = new THREE.Group();

      // 双腿
      const legL = limb(0.13, 0.32, 0.14, c.pants);
      legL.position.set(-0.09, 0.4, 0);
      g.add(legL);
      const legR = limb(0.13, 0.32, 0.14, c.pants);
      legR.position.set(0.09, 0.4, 0);
      g.add(legR);

      // 靴子
      const bootGeo = new THREE.BoxGeometry(0.16, 0.08, 0.18);
      const bootMat = toon(c.boot);
      const bootL = new THREE.Mesh(bootGeo, bootMat);
      bootL.position.set(-0.09, 0.04, 0.02); bootL.castShadow = true;
      g.add(bootL);
      const bootR = new THREE.Mesh(bootGeo, bootMat);
      bootR.position.set(0.09, 0.04, 0.02); bootR.castShadow = true;
      g.add(bootR);

      // 斗篷躯干（梯形：上窄下宽，用 Cylinder）
      const cloak = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.32, 0.55, 10), toon(c.cloak)
      );
      cloak.position.y = 0.62;
      cloak.castShadow = true;
      g.add(cloak);

      // 腰带
      const belt = new THREE.Mesh(
        new THREE.CylinderGeometry(0.28, 0.28, 0.05, 12), toon(c.belt)
      );
      belt.position.y = 0.48;
      g.add(belt);
      const buckle = block(0.06, 0.05, 0.02, c.crystal);
      buckle.position.set(0, 0.48, 0.27);
      g.add(buckle);

      // 双臂
      const armL = limb(0.1, 0.36, 0.13, c.cloak);
      armL.position.set(-0.26, 0.85, 0);
      g.add(armL);
      const armR = limb(0.1, 0.36, 0.13, c.cloak);
      armR.position.set(0.26, 0.85, 0);
      g.add(armR);

      // 头（小部分露出）
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 24, 18), toon(c.skin)
      );
      head.position.y = 1.0; head.castShadow = true;
      g.add(head);

      // 兜帽（半球盖头，留出脸）
      const hood = new THREE.Mesh(
        new THREE.SphereGeometry(0.19, 24, 18, 0, Math.PI * 2, 0, Math.PI * 0.65),
        toon(c.hood)
      );
      hood.position.y = 0.99;
      hood.position.z = -0.02;
      hood.castShadow = true;
      g.add(hood);

      // 兜帽下垂在背后（披风感）
      const hoodBack = block(0.32, 0.5, 0.08, c.hood);
      hoodBack.position.set(0, 0.7, -0.18);
      g.add(hoodBack);

      // 眼睛在兜帽阴影下用发光小点
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0xfcd34d });
      const eyeGeo = new THREE.SphereGeometry(0.014, 8, 6);
      const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
      eyeL.position.set(-0.05, 1.01, 0.14);
      g.add(eyeL);
      const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
      eyeR.position.set(0.05, 1.01, 0.14);
      g.add(eyeR);

      // 长杖（右手持）
      const staff = new THREE.Group();
      const rod = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 1.4, 8), toon(c.staff)
      );
      rod.position.y = 0; rod.castShadow = true;
      staff.add(rod);
      // 杖顶水晶
      const crystal = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.1),
        toon(c.crystal, 0xff9a28, 1.6)
      );
      crystal.position.y = 0.78;
      staff.add(crystal);
      staff.position.set(0.32, 0.7, 0);
      staff.rotation.z = -0.05;
      g.add(staff);

      g.userData = { legL, legR, armL, armR, staff, crystal };
      return g;
    }

    // ============ 共用：石材塔的几段构件 ============
    function towerBase(p, h = 1.2, w = 6) {
      const g = new THREE.Group();
      const main = block(w, h, w, p.stone);
      main.position.y = h / 2;
      g.add(main);
      // 顶部装饰金边
      const trim = block(w + 0.2, 0.15, w + 0.2, p.gold);
      trim.position.y = h;
      g.add(trim);
      // 四角小柱
      for (const [sx, sz] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
        const col = block(0.4, h + 0.2, 0.4, p.stoneDark);
        col.position.set(sx * (w/2 - 0.2), (h + 0.2) / 2, sz * (w/2 - 0.2));
        g.add(col);
      }
      return g;
    }
    function towerMid(p, h = 2.4, w = 4.2) {
      const g = new THREE.Group();
      const main = block(w, h, w, p.stone);
      main.position.y = h / 2;
      g.add(main);
      const trim = block(w + 0.2, 0.12, w + 0.2, p.gold);
      trim.position.y = h;
      g.add(trim);
      // 窗洞（4 面各 1）
      for (let i = 0; i < 4; i++) {
        const win = block(0.4, 0.6, 0.1, '#1a1408');
        const a = (i / 4) * Math.PI * 2;
        win.position.set(Math.cos(a) * (w/2 + 0.01), h * 0.55, Math.sin(a) * (w/2 + 0.01));
        win.rotation.y = -a + Math.PI / 2;
        g.add(win);
        // 窗内透出微光
        const glow = block(0.36, 0.56, 0.02, p.windowGlow, { emissive: 0xff9a28, emissiveIntensity: 1.3 });
        glow.position.copy(win.position);
        glow.rotation.copy(win.rotation);
        glow.position.x += Math.cos(a) * 0.02;
        glow.position.z += Math.sin(a) * 0.02;
        g.add(glow);
      }
      return g;
    }
    function towerUpper(p, h = 1.6, w = 2.8) {
      const g = new THREE.Group();
      const main = block(w, h, w, p.stone);
      main.position.y = h / 2;
      g.add(main);
      const trim = block(w + 0.15, 0.1, w + 0.15, p.gold);
      trim.position.y = h;
      g.add(trim);
      return g;
    }
    function towerSpire(p, h = 1.8, w = 1.0) {
      const g = new THREE.Group();
      const main = block(w, h, w, p.stone);
      main.position.y = h / 2;
      g.add(main);
      // 锥顶
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(w * 0.7, 1.0, 8), toon(p.gold)
      );
      cone.position.y = h + 0.5;
      cone.castShadow = true;
      g.add(cone);
      return g;
    }
    function torch(emColor = 0xff7820) {
      const g = new THREE.Group();
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8), toon('#3a2418')
      );
      pole.position.y = 0.3; pole.castShadow = true;
      g.add(pole);
      const flame = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 16, 12),
        toon('#ffcc66', emColor, 2.0)
      );
      flame.position.y = 0.65;
      g.add(flame);
      g.userData = { flame };
      return g;
    }

    // ============ 渲染器 / 相机 ============
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    let camera, composer, bloom;

    function makeCamera(d) {
      const aspect = window.innerWidth / window.innerHeight;
      const cam = new THREE.OrthographicCamera(
        -d * aspect, d * aspect, d, -d, 0.1, 200
      );
      return cam;
    }
    function setupComposer(strength, radius, threshold) {
      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      bloom = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        strength, radius, threshold
      );
      composer.addPass(bloom);
      composer.addPass(new OutputPass());
    }

    let root = new THREE.Group();
    scene.add(root);
    let updaters = [];

    function reset(bgColor, fogColor, fogNear, fogFar) {
      root.traverse((o) => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) {
          (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
        }
      });
      scene.remove(root);
      root = new THREE.Group();
      scene.add(root);
      updaters = [];
      scene.background = new THREE.Color(bgColor);
      if (fogColor) scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);
      else scene.fog = null;
    }

    function makeSun(color, intensity, pos, shadowSize = 22) {
      const sun = new THREE.DirectionalLight(color, intensity);
      sun.position.set(...pos);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      Object.assign(sun.shadow.camera, {
        left: -shadowSize, right: shadowSize, top: shadowSize, bottom: -shadowSize,
        near: 1, far: 80,
      });
      sun.shadow.bias = -0.0003;
      sun.shadow.normalBias = 0.02;
      sun.shadow.radius = 4;
      return sun;
    }

    // ============ 场景 1：塔外 ============
    function buildOutside() {
      reset('#1a1828', '#1a1828', 30, 80);
      camera = makeCamera(14);
      camera.position.set(28, 22, 28);
      camera.lookAt(0, 4, 0);
      setupComposer(0.5, 0.6, 0.6);

      const p = {
        stone: '#5a5060', stoneDark: '#3a3240', gold: '#c8a14a',
        ground: '#3a3a2a', grass: '#4a4a32',
        windowGlow: '#ffcc66',
      };

      // 灯光
      root.add(new THREE.AmbientLight(0x4858a0, 0.35));
      root.add(new THREE.HemisphereLight(0x6878b8, 0x2a2418, 0.4));
      const sun = makeSun(0xffb070, 1.4, [22, 18, 10]);
      root.add(sun);
      // 远处地平线暖光
      const horizon = new THREE.DirectionalLight(0xff8848, 0.5);
      horizon.position.set(-20, 4, -10);
      root.add(horizon);

      // 地面
      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(40, 64), toon(p.ground)
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      root.add(ground);

      // 通向塔门的石路（沿 +z 方向铺到塔门 z≈3）
      for (let i = 0; i < 12; i++) {
        const stone = block(0.5, 0.05, 0.6, '#6a6258');
        stone.position.set(0, 0.025, 14 - i * 0.95);
        stone.rotation.y = (Math.random() - 0.5) * 0.2;
        root.add(stone);
      }

      // 完整塔楼（高耸）
      const tower = new THREE.Group();
      tower.add(towerBase(p));
      const midGroup = towerMid(p);
      midGroup.position.y = 1.2;
      tower.add(midGroup);
      const upperGroup = towerUpper(p);
      upperGroup.position.y = 1.2 + 2.4;
      tower.add(upperGroup);
      const spireGroup = towerSpire(p);
      spireGroup.position.y = 1.2 + 2.4 + 1.6;
      tower.add(spireGroup);
      // 顶部宝石
      const orb = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.3),
        toon(p.gold, 0xff9a28, 2.0)
      );
      orb.position.y = 1.2 + 2.4 + 1.6 + 1.8 + 1.3;
      tower.add(orb);
      root.add(tower);

      // 塔门（深色矩形 + 拱）
      const door = block(1.4, 1.8, 0.1, '#2a1a14');
      door.position.set(0, 0.9, 3.01);
      tower.add(door);
      const doorTop = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.7, 0.1, 16, 1, false, 0, Math.PI),
        toon('#2a1a14')
      );
      doorTop.position.set(0, 1.8, 3.01);
      doorTop.rotation.z = -Math.PI / 2;
      doorTop.rotation.y = Math.PI / 2;
      tower.add(doorTop);

      // 塔门两侧火把
      const t1 = torch(0xff7820); t1.position.set(-1.2, 0, 3.05); tower.add(t1);
      const t2 = torch(0xff7820); t2.position.set(1.2, 0, 3.05); tower.add(t2);
      updaters.push((t) => {
        const flicker = 1.6 + Math.sin(t * 12) * 0.4 + Math.sin(t * 21) * 0.2;
        t1.userData.flame.material.emissiveIntensity = flicker;
        t2.userData.flame.material.emissiveIntensity = flicker;
      });

      // 远处的石头/树轮廓
      for (let i = 0; i < 14; i++) {
        const rock = block(
          0.6 + Math.random() * 1.0,
          0.3 + Math.random() * 0.6,
          0.6 + Math.random() * 1.0,
          '#2a2a24'
        );
        const ang = Math.random() * Math.PI * 2;
        const r = 14 + Math.random() * 14;
        rock.position.set(Math.cos(ang) * r, rock.geometry.parameters.height / 2, Math.sin(ang) * r);
        root.add(rock);
      }

      // 远山轮廓（背景）
      for (let i = 0; i < 5; i++) {
        const mtn = new THREE.Mesh(
          new THREE.ConeGeometry(3 + Math.random() * 2, 4 + Math.random() * 3, 4),
          toon('#1c1828')
        );
        mtn.position.set(-25 + i * 12, 1.5, -20);
        mtn.rotation.y = Math.PI / 4;
        root.add(mtn);
      }

      // 探险者：沿石路从远处走向塔门
      const adv = makeAdventurer();
      adv.scale.setScalar(1.6); // 远景视角下放大让小人看得清
      root.add(adv);
      updaters.push((t) => {
        const cycle = (t * 0.10) % 1;
        const startZ = 13, endZ = 4;
        adv.position.x = 0;
        adv.position.z = startZ - (startZ - endZ) * cycle;
        adv.rotation.y = Math.PI; // 朝 -z（塔门方向）
        adv.position.y = Math.abs(Math.sin(t * 5)) * 0.04;
        const swing = Math.sin(t * 5) * 0.5;
        adv.userData.legL.rotation.x = swing;
        adv.userData.legR.rotation.x = -swing;
        adv.userData.armL.rotation.x = -swing * 0.6;
        adv.userData.armR.rotation.x = -0.1;
        adv.userData.crystal.rotation.y = t * 2;
      });
    }

    // ============ 场景 2：塔中（火把通道） ============
    function buildMiddle() {
      reset('#0a0810', '#0a0810', 12, 30);
      camera = makeCamera(5);
      camera.position.set(10, 9, 10);
      camera.lookAt(0, 2.5, 0);
      setupComposer(0.9, 0.7, 0.5);

      const p = {
        stone: '#4a4250', stoneDark: '#2a2230', gold: '#fbbf24',
        floor: '#2a2530',
        windowGlow: '#ffaa44',
      };

      // 灯光（暖橙基调，火把为主）
      root.add(new THREE.AmbientLight(0x4a3828, 0.65));
      root.add(new THREE.HemisphereLight(0x6a5848, 0x1a1818, 0.5));
      const top = makeSun(0xffd8a0, 1.0, [6, 18, 6], 8);
      root.add(top);

      // 塔中段（剖开式：4 面墙，但前侧低矮让我们能看到内部）
      const wallH = 5.5;
      const wallT = 0.25;
      const innerR = 2.6; // 内空半边

      // 后墙、左墙、右墙完整
      const wallBack = block(innerR * 2 + wallT * 2, wallH, wallT, p.stoneDark);
      wallBack.position.set(0, wallH / 2, -innerR);
      root.add(wallBack);
      const wallL = block(wallT, wallH, innerR * 2, p.stoneDark);
      wallL.position.set(-innerR, wallH / 2, 0);
      root.add(wallL);
      const wallR = block(wallT, wallH, innerR * 2, p.stoneDark);
      wallR.position.set(innerR, wallH / 2, 0);
      root.add(wallR);

      // 前墙：底部矮墙 + 一个拱门洞（看不见上半墙，露出内部）
      const wallFrontL = block(innerR - 0.6, 1.0, wallT, p.stoneDark);
      wallFrontL.position.set(-innerR/2 - 0.3, 0.5, innerR);
      root.add(wallFrontL);
      const wallFrontR = block(innerR - 0.6, 1.0, wallT, p.stoneDark);
      wallFrontR.position.set(innerR/2 + 0.3, 0.5, innerR);
      root.add(wallFrontR);

      // 地面
      const floorMesh = block(innerR * 2 + wallT * 2, 0.1, innerR * 2 + wallT * 2, p.floor);
      floorMesh.position.y = -0.05;
      root.add(floorMesh);

      // 顶部隐约（透出上一层）
      const ceiling = block(innerR * 2 + wallT * 2, 0.15, innerR * 2 + wallT * 2, p.stoneDark);
      ceiling.position.y = wallH;
      root.add(ceiling);
      // 上层的一截楼梯（穿过天花板洞口）
      const upStair = block(0.8, 0.18, 0.5, p.stone);
      upStair.position.set(1.5, wallH + 0.5, 0);
      root.add(upStair);
      const upStair2 = block(0.8, 0.18, 0.5, p.stone);
      upStair2.position.set(2.0, wallH + 0.9, 0);
      root.add(upStair2);

      // 螺旋楼梯（绕中心一圈半）
      const steps = 18;
      for (let i = 0; i < steps; i++) {
        const step = block(0.9, 0.22, 0.6, p.stone);
        const ang = (i / steps) * Math.PI * 2.2;
        const r = 1.8;
        step.position.set(Math.cos(ang) * r, 0.11 + i * 0.28, Math.sin(ang) * r);
        step.rotation.y = -ang;
        root.add(step);
      }

      // 中心石柱
      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.4, wallH, 12), toon(p.stone)
      );
      pillar.position.y = wallH / 2;
      pillar.castShadow = true;
      pillar.receiveShadow = true;
      root.add(pillar);

      // 墙上 4 个火把
      const torchPositions = [
        [-innerR + 0.05, 2.5,  innerR - 0.7,  Math.PI / 2],
        [-innerR + 0.05, 2.5, -innerR + 0.7,  Math.PI / 2],
        [ innerR - 0.05, 2.5,  innerR - 0.7, -Math.PI / 2],
        [ innerR - 0.05, 2.5, -innerR + 0.7, -Math.PI / 2],
      ];
      const torches = [];
      for (const [x, y, z, rot] of torchPositions) {
        const t = torch(0xff6418);
        t.position.set(x, y, z);
        t.rotation.y = rot;
        root.add(t);
        torches.push(t);
        // 每个火把作为 PointLight 光源
        const pl = new THREE.PointLight(0xff8848, 2.5, 9, 1.5);
        pl.position.set(x, y + 0.3, z);
        root.add(pl);
      }
      updaters.push((t) => {
        for (const tor of torches) {
          tor.userData.flame.material.emissiveIntensity =
            1.7 + Math.sin(t * 12 + tor.position.x) * 0.4
                + Math.sin(t * 21 + tor.position.z) * 0.25;
        }
      });

      // 窗户透出暮色（侧墙的小窗）
      const window1 = block(0.4, 0.7, 0.05, '#ffa850', { emissive: 0xff8830, emissiveIntensity: 1.5 });
      window1.position.set(-innerR + 0.05, 3.8, 0);
      window1.rotation.y = Math.PI / 2;
      root.add(window1);

      // 探险者：沿楼梯向上爬
      const adv = makeAdventurer();
      adv.scale.setScalar(1.3);
      root.add(adv);
      updaters.push((t) => {
        const cycle = ((t * 0.10) + 0.15) % 1;
        const totalSteps = 18;
        const idx = cycle * totalSteps;
        const ang = (idx / totalSteps) * Math.PI * 2.2;
        const r = 1.8;
        adv.position.x = Math.cos(ang) * r;
        adv.position.z = Math.sin(ang) * r;
        adv.position.y = 0.22 + idx * 0.28 + Math.abs(Math.sin(t * 5)) * 0.04;
        adv.rotation.y = -ang + Math.PI / 2 + Math.PI;
        const swing = Math.sin(t * 5) * 0.6;
        adv.userData.legL.rotation.x = swing;
        adv.userData.legR.rotation.x = -swing;
        adv.userData.armL.rotation.x = -swing * 0.6;
        adv.userData.armR.rotation.x = -0.1;
        adv.userData.crystal.rotation.y = t * 2;
      });
    }

    // ============ 场景 3：塔顶（星空 + 宝石） ============
    function buildTop() {
      reset('#050410', null);
      camera = makeCamera(6);
      camera.position.set(11, 8, 11);
      camera.lookAt(0, 2, 0);
      setupComposer(0.7, 0.6, 0.55);

      const p = {
        stone: '#3a3448', stoneDark: '#1e1a2a', gold: '#fcd34d',
      };

      root.add(new THREE.AmbientLight(0x4858a0, 0.45));
      root.add(new THREE.HemisphereLight(0x6878b8, 0x100818, 0.4));
      const moonLight = makeSun(0xb8c8ff, 1.0, [8, 18, -6], 10);
      root.add(moonLight);

      // 塔顶平台（八边形）
      const platform = new THREE.Mesh(
        new THREE.CylinderGeometry(2.4, 2.6, 0.4, 8), toon(p.stone)
      );
      platform.position.y = 0.2;
      platform.castShadow = true;
      platform.receiveShadow = true;
      root.add(platform);
      // 平台金边
      const edge = new THREE.Mesh(
        new THREE.CylinderGeometry(2.5, 2.5, 0.12, 8), toon(p.gold)
      );
      edge.position.y = 0.42;
      root.add(edge);

      // 4 个尖角护栏柱
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
        const post = block(0.25, 0.8, 0.25, p.stoneDark);
        post.position.set(Math.cos(a) * 2.0, 0.8, Math.sin(a) * 2.0);
        root.add(post);
        const top = new THREE.Mesh(
          new THREE.ConeGeometry(0.15, 0.3, 8), toon(p.gold)
        );
        top.position.set(Math.cos(a) * 2.0, 1.35, Math.sin(a) * 2.0);
        root.add(top);
      }

      // 中央祭坛
      const altar = block(1.2, 0.5, 1.2, p.stoneDark);
      altar.position.y = 0.65;
      root.add(altar);
      const altarTop = block(1.3, 0.1, 1.3, p.gold);
      altarTop.position.y = 0.95;
      root.add(altarTop);

      // 漂浮的中央宝石（emissive 大球 + bloom）
      const crystalGroup = new THREE.Group();
      const crystal = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.55),
        toon('#fff0a0', 0xfcd34d, 1.0)
      );
      crystalGroup.add(crystal);
      // 宝石外环（旋转）
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.85, 0.04, 8, 32),
        toon(p.gold, 0xfbbf24, 0.6)
      );
      crystalGroup.add(ring);
      crystalGroup.position.y = 2.2;
      root.add(crystalGroup);
      // 光圈在地面
      const halo = new THREE.Mesh(
        new THREE.RingGeometry(0.9, 1.05, 32),
        new THREE.MeshBasicMaterial({ color: 0xfcd34d, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
      );
      halo.rotation.x = -Math.PI / 2;
      halo.position.y = 1.01;
      root.add(halo);

      updaters.push((t) => {
        crystalGroup.position.y = 2.2 + Math.sin(t * 1.2) * 0.1;
        crystal.rotation.y = t * 0.6;
        crystal.rotation.x = t * 0.3;
        ring.rotation.z = t * 1.5;
        ring.rotation.x = Math.PI / 2 + Math.sin(t * 0.5) * 0.2;
        halo.scale.setScalar(1 + Math.sin(t * 1.8) * 0.08);
      });

      // 探险者：站祭坛右前方，仰望中央宝石
      const adv = makeAdventurer({ cloak: '#2a1a30', hood: '#1a0c20' });
      adv.scale.setScalar(1.15);
      adv.position.set(1.6, 1.0, 1.4);
      adv.rotation.y = -Math.PI * 0.75; // 朝向中央
      root.add(adv);
      updaters.push((t) => {
        adv.position.y = 1.0 + Math.sin(t * 1.5) * 0.03;
        adv.userData.crystal.rotation.y = t * 2;
        // 持杖手举起，朝宝石致敬
        adv.userData.armR.rotation.x = -0.6 + Math.sin(t * 1.2) * 0.08;
        adv.userData.armL.rotation.x = -0.1;
      });

      // 星空（大量小方块 + bloom）
      for (let i = 0; i < 80; i++) {
        const s = 0.06 + Math.random() * 0.16;
        const star = new THREE.Mesh(
          new THREE.BoxGeometry(s, s, s),
          new THREE.MeshBasicMaterial({ color: 0xfff0c0 })
        );
        const r = 22 + Math.random() * 12;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.5 + 0.1;
        star.position.set(
          Math.cos(theta) * Math.sin(phi) * r,
          Math.cos(phi) * r * 0.7,
          Math.sin(theta) * Math.sin(phi) * r
        );
        root.add(star);
        const phase = Math.random() * Math.PI * 2;
        updaters.push((t) => {
          star.scale.setScalar(1 + Math.sin(t * 1.8 + phase) * 0.35);
        });
      }

      // 月亮
      const moon = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 32, 24),
        new THREE.MeshBasicMaterial({ color: 0xfff0d8 })
      );
      moon.position.set(-12, 10, -10);
      root.add(moon);

      // 远处下方更小的尖塔（远眺感）
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2 + 0.2;
        const r = 14 + Math.random() * 6;
        const minH = 1.5 + Math.random() * 2;
        const minTower = new THREE.Group();
        const body = block(0.8, minH, 0.8, '#1a1828');
        body.position.y = minH / 2;
        minTower.add(body);
        const cone = new THREE.Mesh(
          new THREE.ConeGeometry(0.6, 1.0, 6), toon('#2a2434')
        );
        cone.position.y = minH + 0.5;
        minTower.add(cone);
        minTower.position.set(Math.cos(ang) * r, -3, Math.sin(ang) * r);
        root.add(minTower);
      }
    }

    // ============ 切换 ============
    const HINT_TEXT = {
      outside: ['塔外 · 跨越荒原', 'Outside · the long approach'],
      middle:  ['塔中 · 螺旋向上', 'Inside · ascending spire'],
      top:     ['塔顶 · 仰望祭坛', 'Summit · before the altar'],
    };

    function switchScene(key) {
      if (key === 'outside') buildOutside();
      else if (key === 'middle') buildMiddle();
      else buildTop();
      const [zh, en] = HINT_TEXT[key];
      document.getElementById('hint').innerHTML = `${zh}<span class="sub">${en}</span>`;
    }

    document.getElementById('switcher').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      document.querySelectorAll('.switcher button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      switchScene(btn.dataset.scene);
    });

    // ============ 启动 ============
    switchScene('outside');

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      for (const fn of updaters) fn(t);
      composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      const a = window.innerWidth / window.innerHeight;
      const halfH = camera.top;
      camera.left = -halfH * a;
      camera.right = halfH * a;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

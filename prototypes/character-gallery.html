<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Suitspire · 角色画廊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" />
  <style>
    :root {
      --bg: #0a0a0e;
      --gold: #fbbf24;
      --gold-dim: #c8a14a;
      --text: rgba(244,244,245,0.85);
      --text-dim: rgba(244,244,245,0.55);
    }
    html, body { margin: 0; padding: 0; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: 'Noto Sans SC', sans-serif; }
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 14px 24px 8px;
      background: linear-gradient(180deg, rgba(10,10,14,0.95), rgba(10,10,14,0.6) 80%, transparent);
    }
    .brand {
      font-family: 'Cinzel', serif; font-weight: 700;
      font-size: 18px; letter-spacing: 4px;
      color: var(--gold); margin: 0;
    }
    .sub {
      font-size: 11px; letter-spacing: 1.5px;
      color: var(--text-dim); margin-top: 4px;
    }
    nav.sections {
      position: fixed; top: 64px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 4px; flex-wrap: wrap;
      padding: 8px 16px; z-index: 10;
    }
    nav.sections button {
      border: 1px solid rgba(252, 211, 77, 0.18);
      background: rgba(20, 20, 28, 0.65);
      backdrop-filter: blur(10px);
      padding: 8px 18px; border-radius: 999px;
      color: var(--text-dim); cursor: pointer;
      transition: all .25s; font-size: 13px;
      font-family: 'Noto Sans SC', sans-serif;
    }
    nav.sections button:hover { color: var(--gold); border-color: var(--gold-dim); }
    nav.sections button.active {
      background: linear-gradient(135deg, #fbbf24, #c8a14a);
      color: #1a1408; border-color: var(--gold);
      box-shadow: 0 0 16px rgba(252, 211, 77, 0.3);
      font-weight: 600;
    }
    .section-info {
      position: fixed; top: 124px; left: 0; right: 0;
      text-align: center; z-index: 9; pointer-events: none;
    }
    .section-info h2 {
      font-family: 'Cinzel', serif; font-weight: 500;
      font-size: 22px; letter-spacing: 3px;
      color: var(--gold); margin: 0;
    }
    .section-info p {
      font-size: 12px; letter-spacing: 1px;
      color: var(--text-dim); margin: 4px 0 0;
    }
    main { position: fixed; inset: 0; }
    canvas { display: block; }
    .labels {
      position: fixed; bottom: 32px; left: 0; right: 0;
      display: grid; grid-template-columns: repeat(6, 1fr);
      padding: 0 24px; gap: 12px;
      pointer-events: none;
    }
    .labels .cell {
      text-align: center;
      padding: 12px 8px;
      background: rgba(20, 20, 28, 0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(252, 211, 77, 0.12);
      border-radius: 12px;
    }
    .labels .cell.boss { border-color: rgba(255, 94, 94, 0.3); }
    .labels .name {
      font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1.5px;
      color: var(--gold); margin-bottom: 4px;
    }
    .labels .cell.boss .name { color: #ff8888; }
    .labels .desc { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
    .labels .badge {
      display: inline-block; margin-top: 6px;
      font-size: 9px; letter-spacing: 1.5px;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(252, 211, 77, 0.15); color: var(--gold-dim);
    }
    .labels .cell.boss .badge {
      background: rgba(255, 94, 94, 0.15); color: #ff8888;
    }
    #modeToggle {
      position: fixed; top: 16px; right: 20px; z-index: 11;
      background: rgba(20, 20, 28, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(252, 211, 77, 0.25);
      color: var(--gold); cursor: pointer;
      padding: 8px 14px; border-radius: 999px;
      font: 11px 'Cinzel', sans-serif; letter-spacing: 1.5px;
      transition: all .25s;
    }
    #modeToggle:hover { background: rgba(252, 211, 77, 0.15); }
    #modeToggle .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--gold);
      margin-right: 8px; vertical-align: middle;
      box-shadow: 0 0 8px var(--gold);
    }
    #modeToggle.ambient .dot { background: #ff5e5e; box-shadow: 0 0 8px #ff5e5e; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <header>
    <h1 class="brand">SUITSPIRE · CHARACTER GALLERY</h1>
    <div class="sub">角色形象设计 · 备选方案 / Character Design Drafts</div>
  </header>
  <button id="modeToggle"><span class="dot"></span>展示模式 / GALLERY</button>

  <nav class="sections" id="sections">
    <button data-key="player" class="active">玩家</button>
    <button data-key="beast">兽族</button>
    <button data-key="humanoid">人型</button>
    <button data-key="undead">不死</button>
    <button data-key="giant">巨怪</button>
    <button data-key="merchant">商人</button>
    <button data-key="gambler">赌徒</button>
    <button data-key="shrine">神龛</button>
    <button data-key="sorcerer">术士</button>
    <button data-key="chest">宝箱</button>
    <button data-key="forge">铁匠</button>
  </nav>

  <div class="section-info">
    <h2 id="title">—</h2>
    <p id="desc">—</p>
  </div>

  <main></main>
  <div class="labels" id="labels"></div>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ============ Gradient & Material ============
    function makeGradientMap(stops) {
      const c = document.createElement('canvas');
      c.width = stops.length; c.height = 1;
      const ctx = c.getContext('2d');
      stops.forEach((s, i) => { ctx.fillStyle = s; ctx.fillRect(i, 0, 1, 1); });
      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = tex.magFilter = THREE.NearestFilter;
      tex.generateMipmaps = false; return tex;
    }
    const gradientMap = makeGradientMap(['#2a2630', '#5e5868', '#a89888', '#d8c8a0', '#f8e8b0']);

    function toon(color, emissive = 0x000000, emissiveIntensity = 0) {
      return new THREE.MeshToonMaterial({ color, emissive, emissiveIntensity, gradientMap });
    }
    function block(w, h, d, color, opts = {}) {
      const m = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        toon(color, opts.emissive || 0, opts.emissiveIntensity || 0)
      );
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }
    function cyl(rt, rb, h, color, opts = {}) {
      const m = new THREE.Mesh(
        new THREE.CylinderGeometry(rt, rb, h, opts.seg || 12),
        toon(color, opts.emissive || 0, opts.emissiveIntensity || 0)
      );
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }
    function sph(r, color, opts = {}) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(r, opts.wSeg || 18, opts.hSeg || 14),
        toon(color, opts.emissive || 0, opts.emissiveIntensity || 0)
      );
      m.castShadow = true;
      return m;
    }
    function cone(r, h, color, seg = 8, opts = {}) {
      const m = new THREE.Mesh(
        new THREE.ConeGeometry(r, h, seg),
        toon(color, opts.emissive || 0, opts.emissiveIntensity || 0)
      );
      m.castShadow = true;
      return m;
    }
    // 发光点（用 MeshBasic 不受光，给 bloom 抓住）
    function glow(r, color) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(r, 10, 8),
        new THREE.MeshBasicMaterial({ color })
      );
      return m;
    }
    function addEyes(g, y, z, spacing, color = 0xfcd34d, size = 0.025) {
      const eyeL = glow(size, color); eyeL.position.set(-spacing, y, z); g.add(eyeL);
      const eyeR = glow(size, color); eyeR.position.set(spacing, y, z); g.add(eyeR);
      return [eyeL, eyeR];
    }

    // ============ 花色卡牌 ============
    const SUITS = ['spade', 'diamond', 'heart', 'club'];
    const SUIT_COLORS = {
      spade:   { face: '#e6e6e6', em: 0x8888a0, mark: 0x0a0a14 },
      diamond: { face: '#ff8a8a', em: 0xff5878, mark: 0xa8181a },
      heart:   { face: '#ff5e5e', em: 0xff2a2a, mark: 0x6a0a0a },
      club:    { face: '#aaffc3', em: 0x4ade80, mark: 0x0a3a14 },
    };
    // 花色徽记（可复用，前后两面各一个）
    function makeSuitMark(suit, color) {
      const markMat = new THREE.MeshBasicMaterial({ color });
      if (suit === 'spade') {
        const mark = new THREE.Group();
        const top = new THREE.Mesh(new THREE.ConeGeometry(0.035, 0.06, 6), markMat);
        top.rotation.x = Math.PI; top.position.y = 0.015; mark.add(top);
        const stem = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.025, 0.005), markMat);
        stem.position.y = -0.035; mark.add(stem);
        return mark;
      } else if (suit === 'diamond') {
        const m = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.008), markMat);
        m.rotation.z = Math.PI / 4;
        return m;
      } else if (suit === 'heart') {
        const mark = new THREE.Group();
        const ball1 = new THREE.Mesh(new THREE.SphereGeometry(0.024, 12, 8), markMat);
        ball1.position.set(-0.018, 0.012, 0); mark.add(ball1);
        const ball2 = new THREE.Mesh(new THREE.SphereGeometry(0.024, 12, 8), markMat);
        ball2.position.set(0.018, 0.012, 0); mark.add(ball2);
        const tri = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.05, 4), markMat);
        tri.rotation.z = Math.PI; tri.position.set(0, -0.022, 0); mark.add(tri);
        return mark;
      } else { // club
        const mark = new THREE.Group();
        const top = new THREE.Mesh(new THREE.SphereGeometry(0.022, 12, 8), markMat);
        top.position.y = 0.02; mark.add(top);
        const left = new THREE.Mesh(new THREE.SphereGeometry(0.022, 12, 8), markMat);
        left.position.set(-0.022, -0.005, 0); mark.add(left);
        const right = new THREE.Mesh(new THREE.SphereGeometry(0.022, 12, 8), markMat);
        right.position.set(0.022, -0.005, 0); mark.add(right);
        const stem = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.025, 0.005), markMat);
        stem.position.y = -0.04; mark.add(stem);
        return mark;
      }
    }
    function makeSuitCard(suit, w = 0.14, h = 0.2) {
      const g = new THREE.Group();
      const c = SUIT_COLORS[suit];
      // 卡牌骨架（深色不显眼，作为夹心层）
      // z 范围: [-0.012, 0.012]
      const skeleton = block(w + 0.02, h + 0.02, 0.024, '#1a1418');
      g.add(skeleton);
      // 前面花色色面 [0.012, 0.020]
      const front = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.008),
        toon(c.face));
      front.position.z = 0.016;
      g.add(front);
      // 前面花色徽记
      const frontMark = makeSuitMark(suit, c.mark);
      frontMark.position.z = 0.024;
      g.add(frontMark);
      // 背面花色色面 [-0.020, -0.012]
      const back = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.008),
        toon(c.face));
      back.position.z = -0.016;
      g.add(back);
      // 背面花色徽记（镜像）
      const backMark = makeSuitMark(suit, c.mark);
      backMark.position.z = -0.024;
      backMark.rotation.y = Math.PI;
      g.add(backMark);
      return g;
    }
    // 4 张卡牌组合（弧形或扇形布局）
    function makeSuitDeck(layout = 'arc', radius = 0.32) {
      const g = new THREE.Group();
      const cards = [];
      SUITS.forEach((suit, i) => {
        const card = makeSuitCard(suit);
        if (layout === 'arc') {
          // 腰间前方弧形展开（已外推避免穿斗篷）
          const a = (i - 1.5) * 0.38;
          card.position.set(Math.sin(a) * radius, 0, Math.cos(a) * radius * 0.85 + 0.1);
          card.rotation.y = -a;
        } else if (layout === 'fan') {
          // 扇形（向上向后）
          const a = (i - 1.5) * 0.22;
          card.position.set(Math.sin(a) * radius, i * 0.02, -Math.cos(a) * radius * 0.4);
          card.rotation.z = a * 0.6;
          card.rotation.y = Math.PI - a * 0.3;
        } else if (layout === 'spread') {
          // 横向平铺（背后），4 张同高同向无角度，放大 1.5×
          card.scale.set(1.5, 1.5, 1);
          card.position.set((i - 1.5) * 0.26, 0, -radius);
          card.rotation.y = Math.PI;
        }
        g.add(card);
        cards.push(card);
      });
      g.userData.cards = cards;
      return g;
    }

    // ============ Scene / Renderer ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a0e');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.querySelector('main').appendChild(renderer.domElement);

    const aspect = window.innerWidth / window.innerHeight;
    const d = 5;
    const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
    camera.position.set(14, 11, 14);
    camera.lookAt(0, 1.2, 0);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.5, 0.5, 0.7
    );
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    // ============ Root + 工具 ============
    let root = new THREE.Group(); scene.add(root);
    let updaters = [];

    function disposeRoot() {
      root.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
      });
      scene.remove(root); root = new THREE.Group(); scene.add(root); updaters = [];
    }

    function makeSun(color, intensity, pos) {
      const s = new THREE.DirectionalLight(color, intensity);
      s.position.set(...pos); s.castShadow = true;
      s.shadow.mapSize.set(2048, 2048);
      Object.assign(s.shadow.camera, { left: -16, right: 16, top: 10, bottom: -10, near: 1, far: 60 });
      s.shadow.bias = -0.0003; s.shadow.normalBias = 0.02; s.shadow.radius = 4;
      return s;
    }

    // 发光圈底座（NPC 脚下，提供氛围光 + 视觉聚焦）
    function makeGlowRing(color = 0xfbbf24, r = 0.78) {
      const g = new THREE.Group();
      // 主光环（亮）
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(r - 0.06, r, 48),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.32; g.add(ring);
      // 内圈淡光（弥散）
      const inner = new THREE.Mesh(
        new THREE.RingGeometry(r * 0.45, r - 0.08, 48),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.22, side: THREE.DoubleSide })
      );
      inner.rotation.x = -Math.PI / 2;
      inner.position.y = 0.315; g.add(inner);
      // 6 个小光点（沿圈）
      const dots = [];
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.028, 10, 8),
          new THREE.MeshBasicMaterial({ color })
        );
        dot.position.set(Math.cos(a) * (r + 0.04), 0.34, Math.sin(a) * (r + 0.04));
        g.add(dot); dots.push(dot);
      }
      // 来自圈中心的向上点光源
      const pl = new THREE.PointLight(color, 1.2, 2.5, 1.5);
      pl.position.y = 0.5; g.add(pl);
      g.userData = { dots };
      return g;
    }

    // 台座（圆柱底盘 + 八边形顶面 + 金边）
    function makePedestal(color = '#2a2630', accent = '#5a5060') {
      const g = new THREE.Group();
      const base = cyl(0.95, 1.1, 0.25, color, { seg: 8 });
      base.position.y = 0.125; base.receiveShadow = true;
      g.add(base);
      const top = cyl(0.9, 0.9, 0.06, accent, { seg: 8 });
      top.position.y = 0.28;
      g.add(top);
      return g;
    }

    // ============ ★ 共享 limb helper ============
    function limb(w, h, d, color) {
      const pivot = new THREE.Group();
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), toon(color));
      m.position.y = -h / 2; m.castShadow = true;
      pivot.add(m);
      return pivot;
    }

    // ============ §1 玩家（融入 ♠♦♥♣ 花色元素）============
    // C · 剑客（男）— 红白黑 + 灰色装甲层次 + 平铺卡牌
    function makePlayerC() {
      const g = new THREE.Group();
      // —— 鞋（黑底 + 红口）——
      const bootL = block(0.17, 0.1, 0.21, '#1a0e10'); bootL.position.set(-0.09, 0.05, 0.02); g.add(bootL);
      const bootR = block(0.17, 0.1, 0.21, '#1a0e10'); bootR.position.set(0.09, 0.05, 0.02); g.add(bootR);
      const cuffBL = block(0.18, 0.04, 0.19, '#a8181a'); cuffBL.position.set(-0.09, 0.13, 0.02); g.add(cuffBL);
      const cuffBR = block(0.18, 0.04, 0.19, '#a8181a'); cuffBR.position.set(0.09, 0.13, 0.02); g.add(cuffBR);
      // —— 裤子（黑色）——
      const legL = limb(0.14, 0.3, 0.15, '#0e0a0c'); legL.position.set(-0.09, 0.45, 0); g.add(legL);
      const legR = limb(0.14, 0.3, 0.15, '#0e0a0c'); legR.position.set(0.09, 0.45, 0); g.add(legR);
      const kneeL = block(0.15, 0.07, 0.05, '#a8181a'); kneeL.position.set(-0.09, 0.36, 0.075); g.add(kneeL);
      const kneeR = block(0.15, 0.07, 0.05, '#a8181a'); kneeR.position.set(0.09, 0.36, 0.075); g.add(kneeR);
      const stripeL = block(0.04, 0.3, 0.04, '#3a1a1c'); stripeL.position.set(-0.16, 0.45, 0); g.add(stripeL);
      const stripeR = block(0.04, 0.3, 0.04, '#3a1a1c'); stripeR.position.set(0.16, 0.45, 0); g.add(stripeR);
      // —— 腰带（红 + 金扣）——
      const belt = block(0.4, 0.08, 0.28, '#a8181a'); belt.position.y = 0.52; g.add(belt);
      const buckle = block(0.07, 0.09, 0.04, '#fbbf24'); buckle.position.set(0, 0.52, 0.16); g.add(buckle);
      // —— 白色短上衣（底层）——
      const shirt = block(0.38, 0.34, 0.27, '#f0f0f0'); shirt.position.y = 0.73; g.add(shirt);
      // —— 灰色装甲层次 ——
      // 胸前菱形板（旋 45°）
      const chestPlate = block(0.16, 0.16, 0.02, '#a8a8b8');
      chestPlate.position.set(0, 0.82, 0.14);
      chestPlate.rotation.z = Math.PI / 4; g.add(chestPlate);
      // 板中心金色花色钉
      const centerStud = new THREE.Mesh(new THREE.OctahedronGeometry(0.028), toon('#fbbf24'));
      centerStud.position.set(0, 0.82, 0.16); g.add(centerStud);
      // 腹部横甲条（凹陷深灰）
      const beltArmor = block(0.4, 0.07, 0.28, '#8a8a98');
      beltArmor.position.set(0, 0.60, 0.001); g.add(beltArmor);
      const beltArmorLine = block(0.4, 0.015, 0.282, '#5a5a68');
      beltArmorLine.position.set(0, 0.625, 0.002); g.add(beltArmorLine);
      // 肩-胸装甲斜条（连接肩与胸）
      const shConnL = block(0.07, 0.18, 0.06, '#8a8a98');
      shConnL.position.set(-0.16, 0.86, 0.1); shConnL.rotation.z = -0.35; g.add(shConnL);
      const shConnR = block(0.07, 0.18, 0.06, '#8a8a98');
      shConnR.position.set(0.16, 0.86, 0.1); shConnR.rotation.z = 0.35; g.add(shConnR);
      // 颈圈装甲
      const collarArmor = block(0.22, 0.06, 0.22, '#5a5a68');
      collarArmor.position.y = 0.92; g.add(collarArmor);
      // —— 肩甲（红圆球 + 金钉）——
      const shL = sph(0.11, '#a8181a'); shL.position.set(-0.24, 0.92, 0); g.add(shL);
      const shR = sph(0.11, '#a8181a'); shR.position.set(0.24, 0.92, 0); g.add(shR);

    // 通用：大锁孔（金色边 + 深色洞 + 内含发光宝石）
    function makeLock(w = 0.18, h = 0.22, accent = '#fbbf24', glowColor = 0xff7820) {
      const g = new THREE.Group();
      // 金色锁板（背景）
      const plate = block(w + 0.06, h + 0.06, 0.02, accent); g.add(plate);
      // 锁板凸边（凹槽）
      const plateInner = block(w + 0.04, h + 0.04, 0.025, '#1a1010');
      plateInner.position.z = 0.005; g.add(plateInner);
      // 上圆洞
      const hole = new THREE.Mesh(new THREE.CircleGeometry(w * 0.45, 24),
        new THREE.MeshBasicMaterial({ color: 0x05050a }));
      hole.position.set(0, h * 0.2, 0.018); g.add(hole);
      // 下竖洞（钥匙孔下半）
      const slot = block(w * 0.25, h * 0.35, 0.005, '#05050a');
      slot.position.set(0, -h * 0.15, 0.018); g.add(slot);
      // 锁孔内部发光宝石
      const gem = new THREE.Mesh(new THREE.OctahedronGeometry(w * 0.18),
        toon('#fff0a0', glowColor, 2.5));
      gem.position.set(0, h * 0.2, 0.028); g.add(gem);
      // 锁板 4 角钉
      for (const [dx, dy] of [[-w*0.55,-h*0.55],[w*0.55,-h*0.55],[-w*0.55,h*0.55],[w*0.55,h*0.55]]) {
        const stud = sph(0.018, accent); stud.position.set(dx, dy, 0.013); g.add(stud);
      }
      return g;
    }

    // ============ 光照模式 ============
    // gallery: 摄影棚 · 明亮均匀 · 暴露所有细节（画廊预览用）
    // ambient: 氛围光 · 种族主题色 · 暗调对比强（实际场景用）
    const GALLERY_LIGHT = {
      bg: '#1c1c26',
      ambient: { color: 0xf0f0f4, intensity: 0.8 },
      hemi:    { sky: 0xfff4e0, ground: 0x6868a0, intensity: 0.55 },
      sun:     { color: 0xffffff, intensity: 1.5, pos: [10, 14, 14] },
      fill:    { color: 0xa8b8d8, intensity: 0.7, pos: [-12, 8, -6] },
      rim:     { color: 0xfcd34d, intensity: 0.5, pos: [0, 6, -14] },
      bloom:   { strength: 0.42, threshold: 0.78 },
    };
    let lightMode = 'gallery';
    let currentSection = 'player';

    // ============ 切换场景 ============
    function buildSection(key) {
      disposeRoot();
      currentSection = key;
      const sec = sections[key];
      const L = lightMode === 'gallery' ? GALLERY_LIGHT : sec;
      scene.background = new THREE.Color(L.bg !== undefined ? L.bg : sec.bg);
      root.add(new THREE.AmbientLight(L.ambient.color, L.ambient.intensity));
      if (L.hemi) {
        root.add(new THREE.HemisphereLight(L.hemi.sky, L.hemi.ground, L.hemi.intensity));
      } else {
        root.add(new THREE.HemisphereLight(0x6868a0, 0x1a1818, 0.3));
      }
      root.add(makeSun(L.sun.color, L.sun.intensity, L.sun.pos));
      if (L.fill) {
        const f = new THREE.DirectionalLight(L.fill.color, L.fill.intensity);
        f.position.set(...L.fill.pos); root.add(f);
      }
      if (L.rim) {
        const r = new THREE.DirectionalLight(L.rim.color, L.rim.intensity);
        r.position.set(...L.rim.pos); root.add(r);
      }
      bloom.strength = L.bloom.strength;
      bloom.threshold = L.bloom.threshold;

      // 地面
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(40, 20), toon('#15131a')
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      root.add(ground);

      // 排列角色 + 相机动态适配
      const n = sec.items.length;
      const span = n > 3 ? 3.0 : (n === 2 ? 2.6 : (n === 1 ? 0 : 3.5));
      const camD = n > 3 ? 4.5 : (n === 2 ? 2.4 : (n === 1 ? 2.0 : 3.2));
      camera.top = camD; camera.bottom = -camD;
      const _a = window.innerWidth / window.innerHeight;
      camera.left = -camD * _a; camera.right = camD * _a;
      camera.updateProjectionMatrix();
      const startX = -((n - 1) * span) / 2;
      const labelsEl = document.getElementById('labels');
      labelsEl.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
      labelsEl.innerHTML = '';
      sec.items.forEach((item, i) => {
        const x = startX + i * span;
        // 台座
        const ped = makePedestal(item.boss ? '#3a1a1a' : '#2a2630',
                                  item.boss ? '#7a3030' : '#5a5060');
        ped.position.set(x, 0, 0);
        root.add(ped);

        // 发光圈底座（static NPC 必加 / 其他可选）
        const ringColor = item.ring !== undefined ? item.ring : sec.ringColor;
        if (ringColor !== undefined) {
          const ring = makeGlowRing(ringColor, 0.78);
          ring.position.set(x, 0, 0);
          ring.userData.phase = i;
          root.add(ring);
          updaters.push((t) => {
            ring.userData.dots && ring.userData.dots.forEach((d, k) => {
              const a = (k / 6) * Math.PI * 2 + t * 0.5;
              const r2 = 0.82;
              d.position.x = Math.cos(a) * r2;
              d.position.z = Math.sin(a) * r2;
            });
          });
        }
        // 角色
        const m = item.build();
        const floatY = (m.userData && m.userData.floatOffset) || 0;
        const baseRotY = m.rotation.y;
        m.userData = m.userData || {};
        m.userData.baseY = 0.3 + floatY;
        m.position.set(x, m.userData.baseY, 0);
        m.userData.spinSpeed = item.boss ? 0.3 : 0.4;
        m.userData.static = !!item.static;
        m.userData.baseRotY = baseRotY;
        root.add(m);
        updaters.push((t) => {
          if (m.userData.static) {
            m.rotation.y = m.userData.baseRotY + Math.sin(t * 0.4) * 0.15;
          } else {
            m.rotation.y = t * m.userData.spinSpeed;
          }
          m.position.y = m.userData.baseY + Math.sin(t * 1.6 + i) * 0.03;
          // 飘浮型（幽魂/巫妖）保持悬浮
          if (m.userData.orbs) {
            m.userData.orbs.forEach((o, idx) => {
              const ang = t * 0.8 + idx * (Math.PI * 2 / m.userData.orbs.length);
              const r = 0.7;
              o.position.x = Math.cos(ang) * r;
              o.position.z = Math.sin(ang) * r;
            });
          }
          if (m.userData.skulls) {
            m.userData.skulls.forEach((sk, idx) => {
              const ang = t * 1.2 + idx * (Math.PI * 2 / 3);
              const r = 0.55;
              sk.position.x = Math.cos(ang) * r;
              sk.position.z = Math.sin(ang) * r;
              sk.position.y = 1.4 + Math.sin(t * 2 + idx) * 0.08;
            });
          }
          // 铁匠打铁 Loop
          if (m.userData.hammerArm) {
            const phase = (t * 3.2) % (Math.PI * 2);
            // 锤抬起再落下：rotation.x 从 -1.4（举起朝后）摆到 0.3（向下砸）
            m.userData.hammerArm.rotation.x = -0.6 + Math.cos(phase) * 0.9;
          }
          // 火花闪烁（只在锤落下瞬间放大）
          if (m.userData.sparks) {
            const phase = (t * 3.2) % (Math.PI * 2);
            const strike = Math.max(0, Math.cos(phase - Math.PI) ** 4);  // 0 → 1 在锤落下时
            m.userData.sparks.forEach((sp, idx) => {
              const localPhase = sp.userData.phase + t * 4;
              const scale = strike * (0.8 + Math.sin(localPhase) * 0.4) + 0.3;
              sp.scale.setScalar(scale);
              sp.position.y = sp.userData.baseY + strike * 0.08 * Math.sin(localPhase * 1.5);
            });
          }
          // 火焰呼吸
          if (m.userData.fire) {
            m.userData.fire.material.emissiveIntensity = 2.4 + Math.sin(t * 6) * 0.4 + Math.sin(t * 11) * 0.2;
            m.userData.fireCore.material.emissiveIntensity = 3.4 + Math.sin(t * 7) * 0.3;
          }
        });

        // 标签
        const cell = document.createElement('div');
        cell.className = 'cell' + (item.boss ? ' boss' : '');
        cell.innerHTML = `
          <div class="name">${item.name}</div>
          <div class="desc">${item.desc}</div>
          <span class="badge">${item.boss ? 'BOSS' : item.en}</span>
        `;
        labelsEl.appendChild(cell);
      });

      // 标题
      document.getElementById('title').textContent = sec.title;
      document.getElementById('desc').textContent = sec.desc;
    }

    // ============ Nav ============
    document.getElementById('sections').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      document.querySelectorAll('nav.sections button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildSection(btn.dataset.key);
    });

    // ============ Mode toggle ============
    const modeBtn = document.getElementById('modeToggle');
    modeBtn.addEventListener('click', () => {
      lightMode = lightMode === 'gallery' ? 'ambient' : 'gallery';
      modeBtn.classList.toggle('ambient', lightMode === 'ambient');
      modeBtn.innerHTML = lightMode === 'gallery'
        ? '<span class="dot"></span>展示模式 / GALLERY'
        : '<span class="dot"></span>氛围模式 / IN-GAME';
      buildSection(currentSection);
    });

    // ============ 启动 ============
    buildSection('player');

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      for (const fn of updaters) fn(t);
      composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      const a = window.innerWidth / window.innerHeight;
      camera.left = -d * a; camera.right = d * a;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
